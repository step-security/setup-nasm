name: setup-nasm

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-default:
    name: default
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.actor == 'dependabot[bot]' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') }}
        version: [2.16.01, 2.15.05, 2.14.02]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Check out source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install NASM
        uses: ./
        with:
          version: ${{ matrix.version }}
      - name: Verify NASM
        shell: bash
        run: |
          [[ "$(nasm    -version 2>&1)" =~ "NASM version ${{ matrix.version }}" ]]
          [[ "$(ndisasm -version 2>&1)" =~ "NDISASM version ${{ matrix.version }}" ]]
  # We currently do not support source builds on Windows,
  # but GitHub Actions strategy.matrix.exclude is current bugged
  # so we have to duplicate the job instead of filtering out :(
  test-source:
    name: source-only
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.actor == 'dependabot[bot]' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest"]') }}
        version: [2.16.01, 2.15.05, 2.14.02]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Check out source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install NASM
        uses: ./
        with:
          version: ${{ matrix.version }}
          from-source: true
      - name: Verify NASM
        shell: bash
        run: |
          [[ "$(nasm    -version 2>&1)" =~ "NASM version ${{ matrix.version }}" ]]
          [[ "$(ndisasm -version 2>&1)" =~ "NDISASM version ${{ matrix.version }}" ]]
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Check out source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: npm install
      - run: npm run lint
      - run: npm audit --audit-level=moderate --production
      - run: npm audit --audit-level=critical
